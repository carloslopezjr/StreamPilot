version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
  frontend:
    build: ./frontend/react-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/react-frontend:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
